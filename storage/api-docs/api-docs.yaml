      security:
        -
          sanctum: []
    post:
      tags:
        - Rates
      summary: 'Create a date-effective rate'
      operationId: 64a6a5c7ddda62b65ba8ed99500028f3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - level
                - rate
              properties:
                level:
                  type: string
                  enum:
                    - user
                    - client
                    - order
                rate:
                  type: number
                  format: float
                  example: 45.5
                client_id:
                  description: 'Required for level=client'
                  type: string
                  format: uuid
                  nullable: true
                order_id:
                  description: 'Required for level=order'
                  type: string
                  format: uuid
                  nullable: true
                currency:
                  type: string
                  nullable: true
                  enum:
                    - CZK
                    - EUR
                    - USD
                valid_from:
                  description: 'Defaults to today'
                  type: string
                  format: date
                  nullable: true
                note:
                  type: string
                  nullable: true
              type: object
      responses:
        201:
          description: 'Rate created'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rate'
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  '/api/v1/rates/{id}':
    delete:
      tags:
        - Rates
      summary: 'Delete a not-yet-effective rate'
      description: 'History is append-only: only rates with valid_from today or later can be deleted.'
      operationId: 1b854d780fba6c1c61a9d20457f37640
      parameters:
        -
          name: id
          in: path
          description: 'Rate ID'
          required: true
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: 'Rate deleted'
        401:
          description: Unauthenticated
        404:
          description: 'Rate not found'
        422:
          description: 'Rate already took effect and cannot be deleted'
      security:
        -
          sanctum: []
  /api/v1/rates/effective:
    get:
      tags:
        - Rates
      summary: 'Resolve the effective rate for a scope and date'
      operationId: 0d3a4a75640de045f438f1bfd9f18d8e
      parameters:
        -
          name: client_id
          in: query
          description: 'Client scope'
          required: false
          schema:
            type: string
            format: uuid
        -
          name: order_id
          in: query
          description: 'Order scope (its client is included automatically)'
          required: false
          schema:
            type: string
            format: uuid
        -
          name: date
          in: query
          description: 'Work date, defaults to today'
          required: false
          schema:
            type: string
            format: date
      responses:
        200:
          description: 'Resolved rate, or data=null when no rate applies'
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      rate:
                        type: number
                        format: float
                      currency:
                        type: string
                        nullable: true
                      level:
                        type: string
                        enum:
                          - user
                          - client
                          - order
                      valid_from:
                        type: string
                        format: date
                    type: object
                    nullable: true
                type: object
        401:
          description: Unauthenticated
        404:
          description: 'Client or order not found'
      security:
        -
          sanctum: []
  /api/v1/time-entries/sync/clockify:
    post:
      tags:
        - TimeTracking
      summary: 'Sync time entries from Clockify into an order'
      operationId: 248bacf526f38ee992e2c5bb538eaba6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - order_id
                - date_from
                - date_to
              properties:
                order_id:
                  type: string
                  format: uuid
                date_from:
                  type: string
                  format: date
                date_to:
                  type: string
                  format: date
              type: object
      responses:
        200:
          description: 'Sync result'
          content:
            application/json:
              schema:
                properties:
                  created:
                    type: integer
                  updated:
                    type: integer
                  skipped:
                    type: integer
                type: object
        401:
          description: Unauthenticated
        404:
          description: 'Order not found'
        422:
          description: 'Validation error or Clockify not configured'
      security:
        -
          sanctum: []
