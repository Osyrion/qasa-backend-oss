openapi: 3.0.0
info:
  title: 'QASA API Documentation'
  description: 'API documentation for QASA Laravel application - invoicing and client management system'
  contact:
    name: 'QASA Support'
    email: support@qasa.sk
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  version: 1.0.0
paths:
  /api:
    servers:
      - url: 'http://localhost:8000'
        description: 'QASA API Server'
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: 'Register a new user'
      operationId: d748c5812c1a946d42048228967c8b50
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - name
                - surname
                - email
                - password
              properties:
                name:
                  type: string
                  example: Ján
                  maxLength: 100
                surname:
                  type: string
                  example: Novák
                  maxLength: 100
                email:
                  type: string
                  format: email
                  example: jan@example.com
                  maxLength: 255
                password:
                  type: string
                  example: password123
                  maxLength: 255
                  minLength: 8
                title:
                  type: string
                  example: Ing.
                  nullable: true
                  maxLength: 100
                default_currency:
                  type: string
                  example: EUR
                  enum:
                    - CZK
                    - EUR
                    - USD
                locale:
                  type: string
                  example: sk
                country:
                  type: string
                  example: SK
                device_name:
                  type: string
                  example: mobile-app
              type: object
      responses:
        201:
          description: 'User registered successfully'
          content:
            application/json:
              schema:
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                    example: 1|abc123...
                type: object
        422:
          description: 'Validation error'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                type: object
  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: 'Login user'
      operationId: bcdec81432cdd80eb8363cfee03b1f3c
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: jan@example.com
                  maxLength: 255
                password:
                  type: string
                  example: password123
                  maxLength: 255
                remember:
                  type: boolean
                  example: false
                device_name:
                  type: string
                  example: mobile-app
              type: object
      responses:
        200:
          description: 'Login successful'
          content:
            application/json:
              schema:
                properties:
                  token:
                    type: string
                    example: 1|abc123...
                type: object
        422:
          description: 'Invalid credentials'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Nesprávny email alebo heslo.'
                type: object
  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: 'Logout user'
      operationId: 15a4dc0c8584b760dc41dd19a44fdaef
      responses:
        200:
          description: 'Logout successful'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Odhlásenie úspešné.'
                type: object
        401:
          description: Unauthenticated
      security:
        -
          sanctum: []
  /api/v1/auth/me:
    get:
      tags:
        - Authentication
      summary: 'Get current user'
      operationId: 21be5c225f34e0af02ccbaf317135e5f
      responses:
        200:
          description: 'Current user data'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Unauthenticated
      security:
        -
          sanctum: []
  /api/v1/auth/profile:
    put:
      tags:
        - Authentication
      summary: 'Update user profile'
      operationId: 810425017c18e23668df92b6bf4b548a
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                title:
                  type: string
                  example: Ing.
                  nullable: true
                  maxLength: 100
                name:
                  type: string
                  example: Ján
                  nullable: true
                  maxLength: 100
                surname:
                  type: string
                  example: Novák
                  nullable: true
                  maxLength: 100
                email:
                  type: string
                  format: email
                  example: jan@example.com
                  nullable: true
                  maxLength: 255
                phone:
                  type: string
                  example: '+421 900 123 456'
                  nullable: true
                  maxLength: 30
                password:
                  type: string
                  example: newpassword123
                  nullable: true
                  maxLength: 255
                  minLength: 8
                ico:
                  type: string
                  example: '12345678'
                  nullable: true
                  maxLength: 20
                dic:
                  type: string
                  example: '1234567890'
                  nullable: true
                  maxLength: 20
                is_vat_payer:
                  type: boolean
                  example: true
                  nullable: true
                tax_flat_rate:
                  type: integer
                  example: 20
                  nullable: true
                default_currency:
                  type: string
                  example: EUR
                  nullable: true
                  enum:
                    - CZK
                    - EUR
                    - USD
                invoice_prefix:
                  type: string
                  example: FA
                  nullable: true
                  maxLength: 10
                invoice_number_mask:
                  type: string
                  example: '{YYYY}{NNNN}'
                  nullable: true
                  maxLength: 40
                invoice_number_start:
                  type: integer
                  example: 1
                  nullable: true
                locale:
                  type: string
                  example: sk
                  nullable: true
                  maxLength: 5
                country:
                  type: string
                  example: SK
                  nullable: true
                  maxLength: 2
                address:
                  type: string
                  example: 'Hlavná 1'
                  nullable: true
                city:
                  type: string
                  example: Bratislava
                  nullable: true
                postal_code:
                  type: string
                  example: '811 01'
                  nullable: true
                  maxLength: 10
                vat_id:
                  type: string
                  example: SK1234567890
                  nullable: true
                  maxLength: 20
                website:
                  type: string
                  example: 'https://example.com'
                  nullable: true
                  maxLength: 150
                invoice_footer_text:
                  type: string
                  nullable: true
                  maxLength: 1000
                overdue_reminder_days:
                  type: integer
                  example: 14
                  nullable: true
                  maximum: 365
                  minimum: 1
                clockify_api_key:
                  type: string
                  nullable: true
                  maxLength: 100
                clockify_workspace_id:
                  type: string
                  nullable: true
                  maxLength: 50
              type: object
      responses:
        200:
          description: 'Profile updated successfully'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  /api/v1/auth/profile/logo:
    post:
      tags:
        - Authentication
      summary: 'Upload supplier logo printed on invoices'
      operationId: db5c0049289cba3c860ad9ed8c031539
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              required:
                - logo
              properties:
                logo:
                  type: string
                  format: binary
              type: object
      responses:
        200:
          description: 'Logo uploaded'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  '/api/v1/auth/email/verify/{id}/{hash}':
    get:
      tags:
        - Authentication
      summary: 'Verify email address (signed link from the verification email)'
      operationId: e54e69e774c96a25134e1b3d1f4f007c
      parameters:
        -
          name: id
          in: path
          description: 'User ID'
          required: true
          schema:
            type: string
            format: uuid
        -
          name: hash
          in: path
          description: 'Verification hash'
          required: true
          schema:
            type: string
      responses:
        200:
          description: 'Email verified'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Email bol úspešne overený.'
                type: object
        403:
          description: 'Invalid or expired verification link'
  /api/v1/auth/email/verification-notification:
    post:
      tags:
        - Authentication
      summary: 'Resend the email verification link'
      operationId: aa657a15c00ebb209ea8fdb6604d20ee
      responses:
        200:
          description: 'Verification email sent (or already verified)'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Overovací email bol odoslaný.'
                type: object
        401:
          description: Unauthenticated
      security:
        -
          sanctum: []
  /api/v1/auth/google/redirect:
    get:
      tags:
        - Authentication
      summary: 'Get Google OAuth redirect URL'
      operationId: c01f7b2858813d01dee1fd7179ec7e83
      responses:
        200:
          description: 'Google OAuth redirect URL'
          content:
            application/json:
              schema:
                properties:
                  url:
                    type: string
                    example: 'https://accounts.google.com/oauth/authorize?...'
                type: object
  /api/v1/auth/google/callback:
    post:
      tags:
        - Authentication
      summary: 'Handle Google OAuth callback'
      operationId: d601396d630f4a68567332753620c1b1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                code:
                  description: 'Google OAuth authorization code'
                  type: string
                  example: 4/0AX4Xf...
                device_name:
                  type: string
                  example: mobile-app
              type: object
      responses:
        200:
          description: 'Google login successful'
          content:
            application/json:
              schema:
                properties:
                  token:
                    type: string
                    example: 1|abc123...
                type: object
        422:
          description: 'Invalid Google token'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Neplatný Google token.'
                type: object
  /api/v1/auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: 'Send password reset link'
      operationId: 976ebe77ca6a33bbbfa9587d2fc04766
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: jan@example.com
              type: object
      responses:
        200:
          description: 'Reset link sent if the account exists'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Ak účet existuje, poslali sme naň odkaz na obnovenie hesla.'
                type: object
        422:
          description: 'Validation error'
  /api/v1/auth/reset-password:
    post:
      tags:
        - Authentication
      summary: 'Reset password using a token from the reset email'
      operationId: 4174df11ac17336f852a5f9cf7f90e1c
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - token
                - email
                - password
              properties:
                token:
                  type: string
                email:
                  type: string
                  format: email
                  example: jan@example.com
                password:
                  type: string
                  example: newpassword123
                  minLength: 8
              type: object
      responses:
        200:
          description: 'Password reset successfully'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Heslo bolo úspešne zmenené.'
                type: object
        422:
          description: 'Invalid or expired token'
  /api/v1/events:
    get:
      tags:
        - Calendar
      summary: 'List events'
      operationId: 5269d8b40286a5f5828806b1c7ee5776
      parameters:
        -
          name: from
          in: query
          description: 'Range start (inclusive)'
          required: false
          schema:
            type: string
            format: date
        -
          name: to
          in: query
          description: 'Range end (inclusive)'
          required: false
          schema:
            type: string
            format: date
        -
          name: per_page
          in: query
          description: 'Page size'
          required: false
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: 'Events overlapping the given range, ordered by start time'
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                type: object
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
    post:
      tags:
        - Calendar
      summary: 'Create an event'
      operationId: ac0a234a43cacdcfc33ae1a6d7322f30
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - title
                - starts_at
              properties:
                title:
                  type: string
                starts_at:
                  type: string
                  format: date-time
                ends_at:
                  description: 'Required unless is_all_day'
                  type: string
                  format: date-time
                  nullable: true
                is_all_day:
                  type: boolean
                  default: false
                description:
                  type: string
                  nullable: true
                location:
                  type: string
                  nullable: true
                color:
                  type: string
                  example: '#3B82F6'
                  nullable: true
              type: object
      responses:
        201:
          description: 'Event created'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  '/api/v1/events/{event}':
    get:
      tags:
        - Calendar
      summary: 'Show an event'
      operationId: e2be8aca8b446573764156022e48108d
      parameters:
        -
          name: event
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        401:
          description: Unauthenticated
        404:
          description: 'Event not found'
      security:
        -
          sanctum: []
    put:
      tags:
        - Calendar
      summary: 'Update an event'
      operationId: 563261388a699d91e789996e56a2d9a3
      parameters:
        -
          name: event
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - title
                - starts_at
              properties:
                title:
                  type: string
                starts_at:
                  type: string
                  format: date-time
                ends_at:
                  description: 'Required unless is_all_day'
                  type: string
                  format: date-time
                  nullable: true
                is_all_day:
                  type: boolean
                  default: false
                description:
                  type: string
                  nullable: true
                location:
                  type: string
                  nullable: true
                color:
                  type: string
                  example: '#3B82F6'
                  nullable: true
              type: object
      responses:
        200:
          description: 'Event updated'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        401:
          description: Unauthenticated
        404:
          description: 'Event not found'
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
    delete:
      tags:
        - Calendar
      summary: 'Delete an event'
      operationId: 6e4fa3cd540fc2d42b5b231d213f0c88
      parameters:
        -
          name: event
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: 'Event deleted'
        401:
          description: Unauthenticated
        404:
          description: 'Event not found'
      security:
        -
          sanctum: []
  /api/v1/events/export/csv:
    get:
      tags:
        - 'Calendar Export'
      summary: 'Export events as CSV'
      operationId: 1bc0dde15eabb5b424767806d036140f
      parameters:
        -
          name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        -
          name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        200:
          description: 'CSV file download'
          content:
            text/csv: []
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  /api/v1/events/export/ics:
    get:
      tags:
        - 'Calendar Export'
      summary: 'Export events as an ICS (iCalendar) file'
      operationId: 714887dc3c2737f873733beee5b13d73
      parameters:
        -
          name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        -
          name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        200:
          description: 'ICS file download'
          content:
            text/calendar: []
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  /api/v1/events/import/csv:
    post:
      tags:
        - 'Calendar Import'
      summary: 'Import events from a CSV file'
      operationId: dd9d35daabe02637c8189b4db4191f65
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
              type: object
      responses:
        200:
          description: 'Import summary'
          content:
            application/json:
              schema:
                properties:
                  created:
                    type: integer
                  skipped:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
                type: object
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  /api/v1/events/import/ics:
    post:
      tags:
        - 'Calendar Import'
      summary: 'Import events from an ICS (iCalendar) file'
      operationId: 6888d9a13fdc7cdd4053964aefeb1950
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
              type: object
      responses:
        200:
          description: 'Import summary'
          content:
            application/json:
              schema:
                properties:
                  created:
                    type: integer
                  skipped:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
                type: object
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  /api/v1/clients:
    get:
      tags:
        - Clients
      summary: 'List clients'
      operationId: 3e5a3eb89a05f6feb5de58888929297e
      parameters:
        -
          name: per_page
          in: query
          description: 'Items per page'
          required: false
          schema:
            type: integer
            default: 20
        -
          name: role
          in: query
          description: 'Filter by role'
          required: false
          schema:
            type: string
            default: customer
            enum:
              - customer
              - vendor
              - all
        -
          name: client_type
          in: query
          description: 'Filter by client type'
          required: false
          schema:
            type: string
            enum:
              - individual
              - self_employed
              - company
        -
          name: search
          in: query
          description: 'Search term'
          required: false
          schema:
            type: string
        -
          name: currency
          in: query
          description: 'Filter by currency'
          required: false
          schema:
            type: string
            enum:
              - CZK
              - EUR
              - USD
        -
          name: sort
          in: query
          description: 'Sort field'
          required: false
          schema:
            type: string
        -
          name: direction
          in: query
          description: 'Sort direction'
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        200:
          description: 'List of clients'
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
                  meta:
                    type: object
                type: object
        401:
          description: Unauthenticated
      security:
        -
          sanctum: []
    post:
      tags:
        - Clients
      summary: 'Create client'
      operationId: d8e4d2ca14a158a72ec998e0d78fb3fb
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - client_type
                - country
                - currency
                - locale
              properties:
                client_type:
                  type: string
                  enum:
                    - individual
                    - self_employed
                    - company
                title:
                  type: string
                  nullable: true
                  maxLength: 100
                ico:
                  type: string
                  nullable: true
                  maxLength: 20
                dic:
                  type: string
                  nullable: true
                  maxLength: 20
                vat_id:
                  type: string
                  nullable: true
                  maxLength: 20
                company_name:
                  type: string
                  nullable: true
                  maxLength: 200
                is_vat_payer:
                  type: boolean
                is_customer:
                  type: boolean
                  default: true
                is_vendor:
                  type: boolean
                  default: false
                email:
                  type: string
                  format: email
                  nullable: true
                  maxLength: 255
                phone:
                  type: string
                  nullable: true
                  maxLength: 30
                address:
                  type: string
                  nullable: true
                  maxLength: 255
                city:
                  type: string
                  nullable: true
                  maxLength: 100
                postal_code:
                  type: string
                  nullable: true
                  maxLength: 10
                country:
                  type: string
                  example: SK
                  maxLength: 2
                currency:
                  type: string
                  enum:
                    - CZK
                    - EUR
                    - USD
                locale:
                  type: string
                  example: sk
                  maxLength: 5
                color:
                  type: string
                  example: '#3B82F6'
                  nullable: true
                  maxLength: 7
                note:
                  type: string
                  nullable: true
              type: object
      responses:
        201:
          description: 'Client created'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  '/api/v1/clients/{id}':
    get:
      tags:
        - Clients
      summary: 'Get client details'
      operationId: d7d53874ace07699fc0dc27d540ac2a1
      parameters:
        -
          name: id
          in: path
          description: 'Client ID'
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: 'Client details'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        401:
          description: Unauthenticated
        404:
          description: 'Client not found'
      security:
        -
          sanctum: []
    put:
      tags:
        - Clients
      summary: 'Update client'
