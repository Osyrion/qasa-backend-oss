; PHP settings for local development
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300

; Error reporting (development)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Timezone
date.timezone = Europe/Bratislava
